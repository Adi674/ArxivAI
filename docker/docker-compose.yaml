# ============================================================================
# docker-compose.yml — ArxivAI v2.0
# Services: FastAPI, Redis, MinIO, Chroma, Prometheus, Grafana
# ============================================================================

services:
  # ── REDIS (for async tasks & caching) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: arxivai-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arxivai-network

  # ── MINIO (S3-compatible storage) ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: arxivai-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: server /data
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arxivai-network

  # ── CHROMA (Vector Database) ───────────────────────────────────────────────
  chroma:
    image: chromadb/chroma:latest
    container_name: arxivai-chroma
    environment:
      ALLOW_RESET: "true"
    volumes:
      - chroma_data:/chroma/data
    ports:
      - "8001:8000"
    healthcheck:
      test: [ "CMD", "/bin/bash", "-c", "</dev/tcp/localhost/8000" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arxivai-network

  # ── PROMETHEUS (Metrics collection) ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: arxivai-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    depends_on:
      - app
    networks:
      - arxivai-network

  # ── GRAFANA (Dashboard visualization) ──────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: arxivai-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - arxivai-network

  # ── FASTAPI APPLICATION ───────────────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: arxivai-api
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      OLLAMA_BASE_URL: http://ollama:11434
      S3_ENDPOINT: http://minio:9000
      PROMETHEUS_ENABLED: "true"
      # Persist HuggingFace model downloads across container restarts
      HF_HOME: /app/data/hf_cache
      TRANSFORMERS_CACHE: /app/data/hf_cache
    volumes:
      - ../src:/app/src
      - ../scripts:/app/scripts
      - ../data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      chroma:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - arxivai-network
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

# ── NETWORKS ───────────────────────────────────────────────────────────────
networks:
  arxivai-network:
    driver: bridge

# ── VOLUMES ────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  chroma_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
